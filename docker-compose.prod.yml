# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# Removes dev volume mounts and switches to Gunicorn.

services:
  backend:
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-4} --timeout 120
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  celery_worker:
    volumes: []
