name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ============================================================
  # Backend — lint + tests
  # ============================================================
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ticket_db_test
          POSTGRES_USER: ticket_user
          POSTGRES_PASSWORD: ticket_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ticket_user -d ticket_db_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports: ["5672:5672"]
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: core.settings
      SECRET_KEY: ci-insecure-secret-key-for-testing-only
      DEBUG: "True"
      DB_NAME: ticket_db_test
      DB_USER: ticket_user
      DB_PASSWORD: ticket_pass
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_URL: redis://localhost:6379/1
      CELERY_BROKER_URL: amqp://guest:guest@localhost:5672//
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests with coverage
        run: pytest --cov=apps --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend

  # ============================================================
  # Frontend — lint + type-check + tests
  # ============================================================
  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test
